<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Rabbit Boy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="touch-controls">
      <div id="touch-left">
        <button id="btn-left" class="touch-btn dpad">&#9664;</button>
        <button id="btn-right" class="touch-btn dpad">&#9654;</button>
      </div>
      <div id="touch-right">
        <button id="btn-jump" class="touch-btn action">A</button>
        <button id="btn-dash" class="touch-btn action">B</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
